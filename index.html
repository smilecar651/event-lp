<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマイルカーズ GW感謝祭</title>

<style>
body{
 margin:0;
 background:#f5f5f5;
 text-align:center;
 font-family:sans-serif;
}

img{
 width:100%;
 max-width:900px;
 display:block;
 margin:0 auto;
}

/* フェード */
.fade{
 opacity:0;
 transform:translateY(40px);
 transition:1s;
}
.fade.show{
 opacity:1;
 transform:none;
}

/* 動画 */
.video{
 margin:40px 0;
 padding:0 10px;
}

/* 固定LINE */
.fixed-wrap{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 background:#06C755;
 text-align:center;
 z-index:999;
 padding:6px 0;
}

.fixed-line{
 color:white;
 font-weight:bold;
 text-decoration:none;
 display:block;
 padding:5px 0;
}

.fixed-note{
 color:white;
 font-size:12px;
}

/* 共有 */
.share-btn{
 background:#00B900;
 color:white;
 border:none;
 padding:12px 22px;
 border-radius:30px;
 font-weight:bold;
 margin:30px 0;
}

/* 余白 */
.space{
 height:90px;
}
</style>
</head>

<body>

<!-- 上画像 -->
<div class="fade">
  <img src="lp_01.png">
</div>

<!-- 🎥 動画（抽選のあと） -->
<div class="video">

<iframe 
  width="100%" 
  height="400"
  src="https://www.youtube.com/embed/N27WfCaw__w?autoplay=1&mute=1&playsinline=1&loop=1&playlist=N27WfCaw__w"
  frameborder="0"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>

  <p style="font-size:14px;">
    お子様連れ大歓迎です😊✨
  </p>


</div>

<!-- 下画像 -->
<div class="fade">
  <img src="lp_02.png">
</div>

<!-- 共有 -->
<button class="share-btn" onclick="shareLine()">
📤 LINEで友だちに送る
</button>

<div class="space"></div>

<!-- 固定LINE -->
<div class="fixed-wrap">
  <a href="https://lin.ee/XBR1buH" class="fixed-line">
    📩 来場前に通知を受け取る（LINE）
  </a>
  <div class="fixed-note">
    ※登録無料・既に登録済みの方はOKです
  </div>
</div>

<script>
// フェード
const obs = new IntersectionObserver(e=>{
 e.forEach(a=>{
  if(a.isIntersecting){
   a.target.classList.add("show");
  }
 });
});
document.querySelectorAll(".fade").forEach(el=>{
 obs.observe(el);
});

// 共有
function shareLine(){
 const url = location.href;
 const text = "スマイルカーズGW感謝祭やってるよ🚗✨";
 location.href =
 "https://social-plugins.line.me/lineit/share?url="
 + encodeURIComponent(url)
 + "&text=" + encodeURIComponent(text);
}
</script>

</body>
</html>
